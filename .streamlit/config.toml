[theme]
base = "dark"
# Фирменная палитра ГРАФТИО — тёмная тема
primaryColor = "#A8DC1A"              # лайм-зелёный из «кольца» логотипа
backgroundColor = "#0E0E0E"           # глубокий чёрный фон
secondaryBackgroundColor = "#1A1A1A"  # чуть светлее (sidebar, expander, metric)
textColor = "#F2F2F2"                 # почти белый
font = "sans serif"

[server]
maxUploadSize = 50

[client]
showErrorDetails = true
